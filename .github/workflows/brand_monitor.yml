name: Brand Sentiment Monitor

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 00:00 运行一次（北京时间 08:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brand-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai cloudscraper

      # ===== 快照持久化 =====
      - name: Restore snapshot cache
        uses: actions/cache@v3
        with:
          path: |
            brand_monitor/trustpilot_snapshot.json
          key: brand-snapshots-${{ github.run_id }}
          restore-keys: |
            brand-snapshots-

      # ===== 初始化舆情报告文件 =====
      - name: Init brand report
        run: python -c "from utils.brand_report import init_report; init_report()"

      # ===== 品牌舆情（每 24 小时）=====
      - name: Run GearUP Reddit Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python brand_monitor/gearup_reddit.py

      - name: Run GearUP YouTube Monitor
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/gearup_youtube.py

      - name: Run Trustpilot Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/trustpilot_monitor.py

      - name: Run Taiwan Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/taiwan_monitor.py

      - name: Run Korea Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/korea_monitor.py

      - name: Run Russia Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/russia_monitor.py

      - name: Run Middle East Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/mideast_monitor.py

      - name: Run Southeast Asia Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/southeast_asia_monitor.py

      - name: Run Japan Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python brand_monitor/japan_monitor.py

      # ===== 推送舆情报告到仓库 =====
      - name: Push brand report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/brand_report_latest.md
          git diff --staged --quiet || git commit -m "docs: update brand sentiment report [auto]"
          git push
