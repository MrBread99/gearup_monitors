name: Brand Sentiment Monitor

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 00:00 运行一次（北京时间 08:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brand-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai cloudscraper

      # ===== 快照持久化 =====
      - name: Restore snapshot cache
        uses: actions/cache@v3
        with:
          path: |
            brand_monitor/trustpilot_snapshot.json
          key: brand-snapshots-${{ github.run_id }}
          restore-keys: |
            brand-snapshots-

      # ===== 品牌舆情聚合（所有地区），一条消息发出 =====
      - name: Run Brand Monitor (All Regions)
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python brand_monitor/run_all.py

      # ===== 推送舆情报告到仓库 =====
      - name: Push brand report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/brand_report_latest.md
          git diff --staged --quiet || git commit -m "docs: update brand sentiment report [auto]"
          git push
