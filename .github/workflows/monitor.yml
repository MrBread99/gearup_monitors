name: Game Server Monitor

on:
  schedule:
    - cron: '0 */2 * * *' # 每 2 小时运行一次 (UTC时间)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser openai discord.py cloudscraper

      # ===== 快照持久化 =====
      - name: Restore snapshot cache
        uses: actions/cache@v3
        with:
          path: |
            game_monitor/game_calendar_snapshot.json
            game_monitor/platform_incidents_snapshot.json
            game_monitor/ineffective_alerts_snapshot.json
            game_monitor/russia_events_snapshot.json
            competitor_radar/exitlag_pricing_snapshot.json
          key: monitor-snapshots-${{ github.run_id }}
          restore-keys: |
            monitor-snapshots-

      # ===== 游戏网络故障 + 平台状态（每 2 小时）=====
      - name: Run Game Monitor Script
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python game_monitor/monitor.py

      # ===== 俄罗斯活动预警（每 2 小时）=====
      - name: Run Russia Event Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python game_monitor/russia_event_monitor.py

      # ===== 新游上线 + 热游更新（每 2 小时）=====
      - name: Run Game Calendar Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python game_monitor/game_calendar_monitor.py

      # ===== 竞品情报（每 2 小时）=====
      - name: Run Discord Intelligence Listener
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python competitor_radar/discord_listener.py

      - name: Run Competitor Pricing Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python competitor_radar/exitlag_pricing.py
