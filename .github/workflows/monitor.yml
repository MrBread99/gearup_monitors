name: Game Server Monitor

on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时运行一次 (UTC时间)
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动触发运行

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor Script
        env:
          # 在 GitHub Repository -> Settings -> Secrets and variables -> Actions 中
          # 新建 POPO_WEBHOOK_URL，填入你的 POPO 机器人 Webhook 链接
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python monitor.py
