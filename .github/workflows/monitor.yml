name: Game Server Monitor

on:
  schedule:
    - cron: '0 */2 * * *' # 每 2 小时运行一次 (UTC时间)
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动触发运行

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser openai discord.py

      # ===== 快照持久化：从缓存恢复上次运行的快照文件 =====
      - name: Restore snapshot cache
        uses: actions/cache@v3
        with:
          path: |
            game_monitor/game_calendar_snapshot.json
            game_monitor/platform_incidents_snapshot.json
            competitor_radar/exitlag_pricing_snapshot.json
            brand_monitor/trustpilot_snapshot.json
          key: monitor-snapshots-${{ github.run_id }}
          restore-keys: |
            monitor-snapshots-

      - name: Run Game Monitor Script
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python game_monitor/monitor.py

      - name: Run Platform Status Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python game_monitor/platform_status_monitor.py

      - name: Run Game Calendar Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python game_monitor/game_calendar_monitor.py
        
      - name: Run Discord Intelligence Listener
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python competitor_radar/discord_listener.py

      - name: Run Competitor Pricing Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python competitor_radar/exitlag_pricing.py

      - name: Run GearUP Reddit Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python brand_monitor/gearup_reddit.py

      - name: Run GearUP YouTube Monitor
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/gearup_youtube.py

      - name: Run Trustpilot Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/trustpilot_monitor.py

      - name: Run Taiwan Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/taiwan_monitor.py

      - name: Run Korea Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/korea_monitor.py

      - name: Run Russia Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/russia_monitor.py

      - name: Run Middle East Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/mideast_monitor.py

      - name: Run Southeast Asia Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/southeast_asia_monitor.py

      - name: Run Japan Brand Monitor
        env:
          POPO_WEBHOOK_URL: ${{ secrets.POPO_WEBHOOK_URL }}
        run: python brand_monitor/japan_monitor.py
